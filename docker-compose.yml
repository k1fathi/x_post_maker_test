version: '3.8'

services:
  x-poster:
    build: .
    container_name: x-poster
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI:-https://vibte.co/callback}
      - PORT=3000
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: x-poster-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /ssl:/etc/nginx/ssl:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - x-poster
    restart: unless-stopped
